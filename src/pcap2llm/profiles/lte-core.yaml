name: lte-core
description: LTE / EPC troubleshooting profile for Diameter, GTPv2-C, S1AP, NAS-EPS, and DNS.
relevant_protocols:
  - diameter
  - gtpv2
  - s1ap
  - nas-eps
  - dns
  - tls
  - http
top_protocol_priority:
  - diameter
  - gtpv2
  - s1ap
  - nas-eps
  - dns
  - tls
  - http
  - sctp
  - tcp
  - udp
  - ip
protocol_aliases:
  diameter: [diameter]
  gtpv2: [gtpv2, gtpv2-c, gtp]
  s1ap: [s1ap]
  nas-eps: [nas-eps, nas_eps]
  dns: [dns]
  tls: [tls, ssl]
  http: [http, http2]
  sctp: [sctp]
  tcp: [tcp]
  udp: [udp]
  ip: [ip, ipv6]
full_detail_fields:
  diameter:
    - diameter.cmd.code
    - diameter.applicationid
    - diameter.session_id
    - diameter.origin_host
    - diameter.origin_realm
    - diameter.destination_host
    - diameter.destination_realm
    - diameter.User_Name
    - diameter.msisdn
    - diameter.imsi
    # Result / error fields
    - diameter.flags
    - diameter.hop_by_hop_id
    - diameter.end_to_end_id
    - diameter.Result-Code
    - diameter.Experimental-Result-Code
    # Charging / policy fields
    - diameter.CC-Request-Type
    - diameter.Rating-Group
    - diameter.Service-Identifier
  gtpv2:
    - gtpv2.message_type
    - gtpv2.teid
    - gtpv2.imsi
    - gtpv2.msisdn
    - gtpv2.apn
    - gtpv2.ebi
    # Result / cause fields
    - gtpv2.cause
    - gtpv2.seq_no
    # Bearer / access context
    - gtpv2.rat_type
    - gtpv2.pdn_type
    - gtpv2.uli_ecgi_eci
  s1ap:
    - s1ap.procedureCode
    - s1ap.MME_UE_S1AP_ID
    - s1ap.ENB_UE_S1AP_ID
    - s1ap.nas_pdu
    # Failure cause
    - s1ap.cause
    - s1ap.causeGroup
  nas-eps:
    - nas_eps.emm.message_type
    - nas_eps.esm.message_type
    - nas_eps.imsi
    - nas_eps.msisdn
    - nas_eps.apn
    # Reject / failure cause
    - nas_eps.emm.cause
    - nas_eps.esm.cause
  dns:
    - dns.qry.name
    - dns.a
    - dns.aaaa
    - dns.resp.name
    - dns.flags.rcode
# verbatim_protocols: pass the complete raw TShark layer through without any
# field selection or _flatten transformation (only _ws.* keys are stripped).
# Takes priority over full_detail_fields for the same protocol.
# Example — to keep all GTPv2 fields exactly as TShark reports them:
#   verbatim_protocols:
#     - gtpv2
verbatim_protocols: []
reduced_transport_fields:
  - proto
  - src_port
  - dst_port
  - stream
  - sctp_stream
  - anomaly
  - notes
tshark:
  two_pass: false
  extra_args: []
summary_heuristics:
  - Flag retransmissions and analysis warnings as notable findings.
  - Highlight protocol mix dominated by Diameter, GTPv2, or S1AP.
