name: 2g3g-ss7-geran
description: 2G/3G legacy mobile troubleshooting profile for SS7 signaling and GERAN access, without UTRAN.
relevant_protocols:
  - map
  - cap
  - isup
  - bssap
  - gsm_a.dtap
  - tcap
  - sccp
  - m3ua
  - dns
top_protocol_priority:
  - map
  - cap
  - isup
  - bssap
  - gsm_a.dtap
  - tcap
  - sccp
  - m3ua
  - dns
  - sctp
  - tcp
  - udp
  - ip
protocol_aliases:
  map: [gsm_map, map]
  cap: [camel, cap]
  isup: [isup]
  bssap: [bssap]
  gsm_a.dtap: [gsm_a.dtap, gsm_dtap, dtap]
  tcap: [tcap]
  sccp: [sccp]
  m3ua: [m3ua]
  dns: [dns]
  sctp: [sctp]
  tcp: [tcp]
  udp: [udp]
  ip: [ip, ipv6]
full_detail_fields:
  map:
    - gsm_map.localValue
    - gsm_map.imsi
    - gsm_map.msisdn
    - e164.msisdn
    - e212.imsi
  cap:
    - camel.local.arg.operationCode
    - e164.msisdn
    - e212.imsi
  isup:
    - isup.message_type
    - e164.called_party_number.digits
    - e164.calling_party_number.digits
  bssap:
    - bssap.pdu_type
    - bssap.message_type
    - gsm_a.imsi
    - e212.imsi
    - e164.msisdn
  gsm_a.dtap:
    - gsm_a.dtap.msg_mm_type
    - gsm_a.dtap.msg_rr_type
    - gsm_a.imsi
    - e212.imsi
    - e164.msisdn
  tcap:
    - tcap.tid
    - tcap.oid
  sccp:
    - sccp.called.digits
    - sccp.calling.digits
    - sccp.message_type
  m3ua:
    - m3ua.message_class
    - m3ua.message_type
  dns:
    - dns.qry.name
    - dns.a
    - dns.aaaa
    - dns.resp.name
reduced_transport_fields:
  - proto
  - src_port
  - dst_port
  - stream
  - sctp_stream
  - anomaly
  - notes
default_privacy_modes:
  ip: keep
  hostname: keep
  subscriber_id: pseudonymize
  msisdn: pseudonymize
  imsi: pseudonymize
  imei: mask
  email: mask
  distinguished_name: pseudonymize
  token: remove
  uri: mask
  apn_dnn: keep
  diameter_identity: pseudonymize
  payload_text: mask
tshark:
  two_pass: false
  extra_args: []
summary_heuristics:
  - Flag SCCP or SCTP transport anomalies and highlight repeated MAP, CAP, or ISUP transaction patterns.
  - Highlight legacy signaling mixes dominated by MAP, CAP, ISUP, BSSAP, or DTAP over SS7/M3UA.
