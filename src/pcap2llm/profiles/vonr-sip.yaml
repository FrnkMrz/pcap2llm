name: vonr-sip
description: >
  Generic VoNR / IMS SIP troubleshooting profile for voice signaling over 5G NR
  and 5GS. Best used for broad IMS dialog analysis when registration readiness,
  call setup, and release behavior must be inspected in a 5GS voice context.

# ---------------------------------------------------------------------------
# VoNR SIP focus
#
# Useful display filters:
#   SIP only:                     sip
#   Registration + call setup:    sip.Method == "REGISTER" || sip.Method == "INVITE"
#   SIP failures:                 sip.Status-Code >= 400
#   SBC or IMS path issues:       sip || dns
# ---------------------------------------------------------------------------

relevant_protocols:
  - sip
  - dns
  - tcp
  - udp
  - ip

top_protocol_priority:
  - sip
  - dns
  - tcp
  - udp
  - ip

protocol_aliases:
  sip: [sip]
  dns: [dns]
  tcp: [tcp]
  udp: [udp]
  ip: [ip, ipv6]

full_detail_fields:
  sip:
    - sip.Method
    - sip.Status-Code
    - sip.Request-Line
    - sip.CSeq.method
    - sip.Call-ID
    - sip.From
    - sip.To
    - sip.Contact
    - sip.P-Asserted-Identity
    - sip.P-Preferred-Identity
    - sip.User-Agent
    - sip.Reason-Phrase
    - sip.Via
  dns:
    - dns.qry.name
    - dns.qry.type
    - dns.flags.response
    - dns.resp.name
    - dns.resp.type
    - dns.a
    - dns.aaaa

verbatim_protocols: []

reduced_transport_fields:
  - proto
  - src_port
  - dst_port
  - stream
  - anomaly
  - notes

tshark:
  two_pass: true
  extra_args: []

summary_heuristics:
  - Highlight IMS dialog failures in the 5GS voice context, especially when SIP setup or release breaks after otherwise normal 5GS service establishment.
  - Flag clusters of 4xx, 5xx, or 6xx responses as likely VoNR service, routing, or policy failures rather than generic packet loss.
  - Keep DNS discovery visible because VoNR availability can fail at IMS target discovery even when 5GS registration looks healthy.
  - Note retransmissions at the SIP edge so 5GS transport instability does not get mistaken for pure application-layer rejection.
