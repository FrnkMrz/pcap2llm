name: share
description: >
  Safe for sharing with external parties or cross-team review.
  Subscriber identifiers are pseudonymized; tokens and bearer-text removed.
modes:
  ip: pseudonymize
  hostname: pseudonymize
  subscriber_id: pseudonymize
  msisdn: pseudonymize
  imsi: pseudonymize
  imei: mask
  email: mask
  distinguished_name: pseudonymize
  token: remove
  uri: mask
  apn_dnn: keep
  diameter_identity: pseudonymize
  payload_text: mask
