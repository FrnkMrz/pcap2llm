name: lte-s11
description: >
  S11 control-plane profile for MME to SGW signaling over GTPv2-C on UDP.
  Focused on bearer lifecycle, session establishment, modification, teardown,
  and response matching in the EPC control plane.

# ---------------------------------------------------------------------------
# S11 / GTPv2-C focus
#
# Useful display filters:
#   S11 only:                      gtpv2 && udp.port == 2123
#   Create Session:                gtpv2.message_type == 32
#   Modify Bearer:                 gtpv2.message_type == 34
#   Delete Session:                gtpv2.message_type == 36
#   Error causes:                  gtpv2.cause
# ---------------------------------------------------------------------------

relevant_protocols:
  - gtpv2
  - udp
  - ip

top_protocol_priority:
  - gtpv2
  - udp
  - ip

protocol_aliases:
  gtpv2: [gtpv2, gtpv2-c]
  udp: [udp]
  ip: [ip, ipv6]

full_detail_fields:
  gtpv2:
    - gtpv2.message_type
    - gtpv2.teid
    - gtpv2.imsi
    - gtpv2.msisdn
    - gtpv2.apn
    - gtpv2.ebi
    - gtpv2.cause
    - gtpv2.seq
    - gtpv2.sequence_number
    - gtpv2.rat_type
    - gtpv2.pdn_type
    - gtpv2.uli_ecgi_eci

verbatim_protocols: []

reduced_transport_fields:
  - proto
  - src_port
  - dst_port
  - stream
  - anomaly
  - notes

tshark:
  two_pass: false
  extra_args: []

summary_heuristics:
  - Highlight Create Session, Modify Bearer, and Delete Session exchanges that lack matching responses or return non-success cause values.
  - Flag GTPv2-C cause patterns and sequence mismatches as likely MME to SGW control-plane failures.
  - Note Error Indication traffic and bursts of unanswered requests as signs of stale TEIDs, SGW reachability issues, or control-plane desynchronization.
