name: llm-telecom-safe
description: >
  External LLM troubleshooting for telecom traces.
  Subscriber and secret-bearing fields are protected, while network relationships stay analyzable via pseudonymized endpoints and node identities.
modes:
  ip: pseudonymize
  hostname: pseudonymize
  subscriber_id: pseudonymize
  msisdn: pseudonymize
  imsi: pseudonymize
  imei: pseudonymize
  email: remove
  distinguished_name: pseudonymize
  token: remove
  uri: mask
  apn_dnn: keep
  diameter_identity: pseudonymize
  payload_text: remove
