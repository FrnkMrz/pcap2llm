name: 5g-nas-5gs
description: >
  NAS-5GS-centered profile for UE and AMF signaling logic. Prioritizes NAS
  message sequencing, identity handling, mobility causes, and PDU-session NAS
  exchanges over the surrounding NGAP procedure scaffolding.

# ---------------------------------------------------------------------------
# NAS-5GS focus
#
# Useful display filters:
#   NAS-5GS only:                  nas-5gs
#   Mobility management:           nas_5gs.mm.message_type
#   Session management:            nas_5gs.sm.message_type
#   NAS reject analysis:           nas_5gs.mm.5gmm_cause || nas_5gs.sm.5gsm_cause
# ---------------------------------------------------------------------------

relevant_protocols:
  - nas-5gs
  - ngap
  - sctp

top_protocol_priority:
  - nas-5gs
  - ngap
  - sctp
  - ip

protocol_aliases:
  nas-5gs: [nas-5gs, nas_5gs]
  ngap: [ngap]
  sctp: [sctp]
  ip: [ip, ipv6]

full_detail_fields:
  nas-5gs:
    - nas_5gs.mm.message_type
    - nas_5gs.sm.message_type
    - nas_5gs.suci
    - nas_5gs.supi
    - nas_5gs.5g_tmsi
    - nas_5gs.dnn
    - nas_5gs.mm.5gmm_cause
    - nas_5gs.sm.5gsm_cause
  ngap:
    - ngap.procedureCode
    - ngap.AMF_UE_NGAP_ID
    - ngap.RAN_UE_NGAP_ID
    - ngap.nas_pdu

verbatim_protocols: []

reduced_transport_fields:
  - proto
  - src_port
  - dst_port
  - stream
  - sctp_stream
  - anomaly
  - notes

tshark:
  two_pass: false
  extra_args: []

summary_heuristics:
  - Highlight registration, authentication, security mode, and PDU-session NAS chains that reject, loop, or stop before completion.
  - Flag repeated 5GMM and 5GSM cause values as likely UE-state or core-state blockers rather than generic NGAP procedure noise.
  - Use NGAP context only to anchor NAS sequencing, not to overwhelm the profile with N2-centric detail.
